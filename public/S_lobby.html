<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화상채팅방 로비 (학생용)</title>
    <link rel="stylesheet" href="/css/S_lobby.css">
</head>

<body>
    <div class="lobby-container">
        <section class="room-section">
            <h1 class="section-title">화상채팅방 목록</h1>

            <div class="gray-background room-area">
                <div class="room-grid" id="roomGrid">
                </div>
            </div>
        </section>

        <aside class="sidebar-section">
            <div class="users-container">
                <h1 class="section-title">접속자</h1>
                <div class="gray-background user-content">
                    <div class="user-summary" id="userCounts"></div>
                    <hr class="divider">
                    <div class="user-list" id="userList"></div>
                </div>
            </div>

            <div class="chat-container">
                <h1 class="section-title">채팅</h1>
                <div class="gray-background chat-content">
                    <div class="chat-history" id="chatBox"></div>
                    <div class="chat-input-row">
                        <select class="chat-target" id="chatTarget">
                            <option value="all">[전체]</option>
                            <option value="whisper">[귓속말]</option>
                        </select>

                        <input type="text" class="chat-target-input" id="chatTargetInput" placeholder="상대방 닉네임" style="display: none; width: 90px;" autocomplete="off">

                        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요"
                            autocomplete="off">
                        <button class="send-btn" id="sendBtn">전송</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/lobby.js"></script>
    <script>
        // 로그인 토큰 확인 로직
        const tk = localStorage.getItem("token")

        if (!tk) {
            alert("로그인 정보가 없습니다. 로그인 페이지로 이동합니다.")
        }

        const token = localStorage.getItem("token")

        async function loadRoomsForStudent() {
            try {
                const response = await fetch("/room/rooms")
                if (!response.ok) throw new Error("방 목록을 불러오지 못했습니다.")
                
                const rooms = await response.json()

                const roomGrid = document.getElementById("roomGrid")
                if(!roomGrid) return
                
                roomGrid.innerHTML = ""

                rooms.forEach(room => {
                    if (room.use) {
                        const card = document.createElement("div")
                        card.className = "room-card"
                        card.style.cursor = "pointer"

                        card.innerHTML = `
                            <div class="card-header">
                                <h3>${room.title}</h3>
                            </div>
                            <p>${room.username} 선생님</p>
                            <div class="tag-group">
                                <span class="tag">${room.subject}</span>
                                <span class="tag">${room.level}</span>
                            </div>
                        `

                        // 학생용 아이디가 참가를 눌렀을 때 방에 들어가지는 이벤트
                        card.addEventListener("click", () => {
                            if (!token) {
                                alert("로그인이 필요한 서비스입니다.")
                                return
                            }
                            
                            const confirmEnter = confirm(`'${room.title}' 과외방에 입장하시겠습니까?`)
                            if (confirmEnter) {
                                window.location.href = `/room.html?roomId=${room._id}`
                            }
                        })

                        roomGrid.appendChild(card)
                    }
                })
            } catch (error) {
                console.error("학생 화면 방 로드 에러:", error)
            }
        }

        loadRoomsForStudent()
    </script>
</body>

</html>
