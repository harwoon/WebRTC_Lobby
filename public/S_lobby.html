<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화상채팅방 로비 (학생용)</title>
    <link rel="stylesheet" href="S_lobby.css">
</head>
<body>
    <div class="lobby-container">
        <section class="room-section">
            <h1 class="section-title">화상채팅방 목록</h1>
            
            <div class="gray-background room-area">
                <div class="room-grid" id="roomGrid">
                    </div>
                
                <div class="room-actions">
                    <button id="joinRoomBtn" class="join-room-btn">방 참가</button>
                </div>
            </div>
        </section>

        <aside class="sidebar-section">
            <div class="users-container">
                <h1 class="section-title">접속자</h1>
                <div class="gray-background user-content">
                    <div class="user-summary" id="userCounts"></div>
                    <hr class="divider">
                    <div class="user-list" id="userList"></div>
                </div>
            </div>

            <div class="chat-container">
                <h1 class="section-title">채팅</h1>
                <div class="gray-background chat-content">
                    <div class="chat-history" id="chatBox"></div>
                    <div class="chat-input-row">
                        <select class="chat-target" id="chatTarget">
                            <option value="all">[전체]</option>
                        </select>
                        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요" autocomplete="off">
                        <button class="send-btn" id="sendBtn">전송</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // 로그인 토큰 확인 로직
        const token = localStorage.getItem("token");

        if(!token){
            alert("로그인 정보가 없습니다. 로그인 페이지로 이동합니다.")
            // location.href = "login.html"
        }

        // 백엔드에서 내 정보 가져오기
        async function fetchUserInfo(){
            try {
                const response = await fetch("/auth/me", {
                    method: "GET",
                    headers: { "Authorization": `Bearer ${token}` }
                })
                if (!response.ok) throw new Error("인증 실패")
                const user = await response.json()
                return user.nickname
            } catch(error) {
                console.error("유저 정보를 가져오지 못했습니다:", error)
                localStorage.removeItem("token")
            }
        }
        
        fetchUserInfo()

        // 팝업창 UI 열고 닫는 스크립트
        const joinRoomBtn = document.getElementById("joinRoomBtn")
        const joinRoomModal = document.getElementById("joinRoomModal")
        const cancelJoinBtn = document.getElementById("cancelJoinBtn")
        const confirmJoinBtn = document.getElementById("confirmJoinBtn")
        const joinRoomName = document.getElementById("joinRoomName")

        // 참가 버튼 누르면 팝업 보이기
        joinRoomBtn.addEventListener("click", () => {
            joinRoomModal.style.display = "flex"
            joinRoomName.focus()
        })

        // 취소 버튼 누르면 팝업 숨기기
        cancelJoinBtn.addEventListener("click", () => {
            joinRoomModal.style.display = "none"
            joinRoomName.value = ""
        })

        // 팝업에서 참가하기 눌렀을 때의 임시 동작
        confirmJoinBtn.addEventListener("click", () => {
            const roomName = joinRoomName.value.trim();
            if(roomName) {
                alert(`'${roomName}' 방으로 입장합니다. (이후 기능 연결 필요)`)
                joinRoomModal.style.display = "none"
                joinRoomName.value = ""
            }
        })
    </script>
</body>
</html>
