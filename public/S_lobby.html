            </div>

            <div class="chat-container">
                <h1 class="section-title">채팅</h1>
                <div class="gray-background chat-content">
                    <div class="chat-history" id="chatBox"></div>
                    <div class="chat-input-row">
                        <select class="chat-target" id="chatTarget">
                            <option value="all">[전체]</option>
                        </select>
                        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요"
                            autocomplete="off">
                        <button class="send-btn" id="sendBtn">전송</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

        const roomGrid = document.getElementById("roomGrid")

        // 방 목록 가져오기
        async function fetchRooms() {
            try {
                const response = await fetch("/room/rooms")

                if (!response.ok) {
                    throw new Error("방 정보를 불러오지 못했습니다")
                }

                const rooms = await response.json()

                roomGrid.innerHTML = ""

                if (rooms.length === 0) {
                    roomGrid.innerHTML = `<p class="no-room">개설된 방이 없습니다.</p>`;
                    return;
                }

                rooms.forEach(room => {
                    const roomCard = document.createElement("div")
                    roomCard.className = "room-card"

                    // 카드 내부 디자인
                    roomCard.innerHTML = `
                    <div class="room-header">
                        <h2 class="room-title">${room.title}</h2>
                        <div class="room-status">
                            <span class="status-dot green"></span>
                        </div>
                    </div>
                    <div class="host-name">${room.nickname} 선생님</div>
                    <div class="room-tags">
                        <span class="tag subject-tag">${room.subject}</span>
                        <span class="tag level-tag">${room.level}</span>
                    </div>
                    `

                    roomCard.dataset.roomId = room._id;

                    roomGrid.appendChild(roomCard);
                });
            } catch (error) {
                console.error(error)
            }

        }

        fetchRooms()

        // 방 클릭 이벤트
        roomGrid.addEventListener("click", (e) => {
            const card = e.target.closest(".room-card");
            if (!card) return;

            const roomId = card.dataset.roomId;
            console.log("선택된 방 ID:", roomId);

            // localStorage.setItem("channel", roomId);
