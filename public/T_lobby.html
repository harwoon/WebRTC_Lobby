<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화상채팅방 로비 (선생님용)</title>
    <link rel="stylesheet" href="/css/T_lobby.css">
</head>
<body>
    <div class="lobby-container">
        <section class="room-section">
            <h1 class="section-title">화상채팅방 목록</h1>
            
            <div class="gray-background room-area">
                <div class="room-grid" id="roomGrid">
                    </div>
                
                <div class="room-actions">
                    <button id="createRoomBtn" class="create-room-btn">방 생성</button>
                </div>
            </div>
        </section>

        <aside class="sidebar-section">
            <div class="users-container">
                <h1 class="section-title">접속자</h1>
                <div class="gray-background user-content">
                    <div class="user-summary" id="userCounts"></div>
                    <hr class="divider">
                    <div class="user-list" id="userList"></div>
                </div>
            </div>

            <div class="chat-container">
                <h1 class="section-title">채팅</h1>
                <div class="channel-row">
                    <label for="channelSelect">채널 선택: </label>
                    <select id="channelSelect" class="channel-select">
                        <option value="lobby">로비</option>
                        <option value="korean">국어</option>
                        <option value="english">영어</option>
                        <option value="math">수학</option>
                        <option value="society">사회</option>
                        <option value="science">과학</option>
                    </select>
                </div>
                <div class="gray-background chat-content">
                    <div class="chat-history" id="chatBox"></div>
                    <div class="chat-input-row">
                        <select class="chat-target" id="chatTarget">
                            <option value="all">[전체]</option>
                            <option value="whisper">[귓속말]</option>
                        </select>

                        <input type="text" class="chat-target-input" id="chatTargetInput" placeholder="상대방 닉네임" style="display: none; width: 90px;" autocomplete="off">

                        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요" autocomplete="off">
                        <button class="send-btn" id="sendBtn">전송</button>
                    </div>
                </div>
            </div>
        </aside>
    </div> 

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/lobby.js"></script>
    <script>

        const tk = localStorage.getItem("token")
        if (!tk) {
        alert("로그인 정보가 없습니다. 로그인 페이지로 이동합니다.");
        }

    </script>
</body>
</html>
