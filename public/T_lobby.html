<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화상채팅방 로비 (선생님용)</title>
    <link rel="stylesheet" href="T_lobby.css">
</head>
<body>
    <div class="lobby-container">
        <section class="room-section">
            <h1 class="section-title">화상채팅방 목록</h1>
            
            <div class="gray-background room-area">
                <div class="room-grid" id="roomGrid">
                    </div>
                
                <div class="room-actions">
                    <button id="createRoomBtn" class="create-room-btn">방 생성</button>
                </div>
            </div>
        </section>

        <aside class="sidebar-section">
            
            <div class="users-container">
                <h1 class="section-title">접속자</h1>
                <div class="gray-background user-content">
                    <div class="user-summary" id="userCounts">
                        </div>
                    <hr class="divider">
                    <div class="user-list" id="userList">
                        </div>
                </div>
            </div>

            <div class="chat-container">
                <h1 class="section-title">채팅</h1>
                <div class="gray-background chat-content">
                    <div class="chat-history" id="chatBox">
                        </div>
                    <div class="chat-input-row">
                        <select class="chat-target" id="chatTarget">
                            <option value="all">[전체]</option>
                        </select>
                        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요">
                        <button class="send-btn" id="sendBtn">전송</button>
                    </div>
                </div>
            </div>

        </aside>
    </div> 
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io()
        console.log("socket created")

        //token으로 사용자 정보 받아오기
        const token = localStorage.getItem("token")

        if(!token){
            alert("로그인 정보가 없습니다. 로그인 페이지로 이동합니다.")
            // location.href = 로그인html
        }

        let currentChannel = localStorage.getItem("channel")
        if(!currentChannel){
            alert("채널 정보가 없습니다")
            // location.href = 로비새로고침? 로그인?
        }

        // token으로 유저 정보 받아오기
        async function fetchUserInfo(){
            try{

                const response = await fetch("/auth/me", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!response.ok) {
                throw new Error("인증 실패")
            }

            const user = await response.json()
            return user.nickname

            }catch(error){
                console.error("유저 정보를 가져오지 못했습니다:", error)
                localStorage.removeItem("token")
                //location.href = 로그인html
            }
        }
        
        // 받아온 닉네임으로 join 이벤트 발생시키기
        async function initSocketConnection() {
            const nickname = await fetchUserInfo();
            
            if (nickname) {
                //console.log("확인된 닉네임: ", nickname);
                socket.emit("join", { nickname, channel: currentChannel });
            }
        }

        initSocketConnection();

        // 엔터로 메세지 전송
        const chatInput = document.getElementById("chatInput")
        chatInput.addEventListener("keydown",(e)=>{
            if(e.key === "ENTER") sendMessage()
        })

        document.getElementById("sendBtn").onclick = sendMessage

        // 메세지 전송
        function sendMessage(){
            const text = chatInput.value.trim()
            
            if(text){
                socket.emit("chat",{text})
                chatInput.value = ""
            }
        }
    </script>
</body>
</html>
