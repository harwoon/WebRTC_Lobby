<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화상채팅방 로비 (선생님용)</title>
    <link rel="stylesheet" href="/css/T_lobby.css">
</head>
<body>
    <div class="lobby-container">
        <section class="room-section">
            <h1 class="section-title">화상채팅방 목록</h1>
            
            <div class="gray-background room-area">
                <div class="room-grid" id="roomGrid">
                    </div>
                
                <div class="room-actions">
                    <button id="createRoomBtn" class="create-room-btn">방 생성</button>
                </div>
            </div>
        </section>

        <aside class="sidebar-section">
            <div class="users-container">
                <h1 class="section-title">접속자</h1>
                <div class="gray-background user-content">
                    <div class="user-summary" id="userCounts"></div>
                    <hr class="divider">
                    <div class="user-list" id="userList"></div>
                </div>
            </div>

            <div class="chat-container">
                <h1 class="section-title">채팅</h1>
                <div class="gray-background chat-content">
                    <div class="chat-history" id="chatBox"></div>
                    <div class="chat-input-row">
                        <select class="chat-target" id="chatTarget">
                            <option value="all">[전체]</option>
                        </select>
                        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요" autocomplete="off">
                        <button class="send-btn" id="sendBtn">전송</button>
                    </div>
                </div>
            </div>
        </aside>
    </div> 

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io()

        const LOBBY_CHANNEL = "로비"
        const token = localStorage.getItem("token")

        // 로비 입장하기
        async function enterLobbyChat() {
            try {
                // 토큰이 없으면 임시 닉네임 부여 (테스트용)
                let nickname = "선생님_" + Math.floor(Math.random() * 1000)
                
                if (token) {
                    const response = await fetch("/auth/me", {
                        method: "GET",
                        headers: { "Authorization": `Bearer ${token}` }
                    })
                    if (response.ok) {
                        const user = await response.json()
                        nickname = user.nickname
                    }
                }
                socket.emit("join", { nickname: nickname, channel: LOBBY_CHANNEL })
            } catch(error) {
                console.error("유저 정보 에러:", error)
            }
        }
        
        enterLobbyChat()

        // 로비 채팅창 기능
        const chatInput = document.getElementById("chatInput")
        const chatBox = document.getElementById("chatBox")
        const chatTarget = document.getElementById("chatTarget")

        function sendMessage() {
            const text = chatInput.value.trim()
            const target = chatTarget.value
            
            if(text) {
                const payload = { text: text }
                if (target !== "all") payload.to = target
                
                socket.emit("chat", payload)
                chatInput.value = ""
            }
        }

        // 전송 버튼
        chatInput.addEventListener("keydown", (e) => {
            if(e.key === "Enter") sendMessage()
        })
        document.getElementById("sendBtn").addEventListener("click", sendMessage)

        // 남이 보낸 메시지 화면에 띄우기
        socket.on("message", (msg) => {
            const messageDiv = document.createElement("div")
            if (msg.user === "system") {
                messageDiv.style.color = "gray"
                messageDiv.style.fontSize = "0.9em"
                messageDiv.textContent = `[안내] ${msg.text}`
            } else {
                messageDiv.style.color = "black"
                messageDiv.textContent = `${msg.user}: ${msg.text}`
            }
            chatBox.appendChild(messageDiv)
            chatBox.scrollTop = chatBox.scrollHeight
        });

        // 귓속말 화면에 띄우기
        socket.on("whisper", (msg) => {
            const messageDiv = document.createElement("div")
            messageDiv.style.color = "blue"
            messageDiv.textContent = `[귓속말] ${msg.user}: ${msg.text}`
            chatBox.appendChild(messageDiv)
            chatBox.scrollTop = chatBox.scrollHeight
        })

        // 방 생성 버튼 이벤트===========================================
        const createRoomBtn = document.getElementById("createRoomBtn")

        createRoomBtn.addEventListener("click", async () => {
            const title = prompt("방 제목을 입력하세요:")
            if (!title) return
            
            const subject = prompt("과목 태그를 입력하세요.")
            const level = prompt("수준 태그를 입력하세요.")

            const userId = localStorage.getItem("_id")

            if (!token) {
                alert("로그인이 필요합니다!")
                return;
            }

            try {
                const response = await fetch("/room/create", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}` 
                    },
                    body: JSON.stringify({
                        title: title,
                        subject: subject,
                        level: level,
                        userId: userId
                    })
                })

                const result = await response.json()

                if (response.ok) {
                    alert("방이 생성되었습니다!")
                    window.location.href = `/room.html?roomId=${result._id}`
                } else {
                    alert("방 생성 실패: " + (result.message || "알 수 없는 오류"))
                }
            } catch (error) {
                console.error("방 생성 중 오류:", error)
                alert("서버와 통신 중 문제가 발생했습니다.")
            }
        })


        // 🌟 [추가] DB에서 방 목록을 가져와서 화면에 그리고 입장 이벤트를 연결하는 함수
        async function loadRooms() {
            try {
                // 1. 백엔드에서 생성된 전체 방 목록 가져오기
                const response = await fetch("/room/rooms");
                if (!response.ok) throw new Error("방 목록을 불러오지 못했습니다.");
                
                const rooms = await response.json();
                const roomGrid = document.getElementById("roomGrid");
                roomGrid.innerHTML = ""; // 기존 목록 싹 비우기 (중복 방지)

                // 2. 가져온 방 데이터를 바탕으로 카드 만들기
                rooms.forEach(room => {
                    // use가 true(활성화)인 방만 보여주기
                    if (room.use) {
                        // 카드 컨테이너(div) 생성
                        const card = document.createElement("div");
                        card.className = "room-card"; // CSS에 설정해두신 카드 클래스 이름으로 맞춰주세요!
                        card.style.cursor = "pointer"; // 마우스를 올리면 손가락 모양으로 변경

                        // 카드 내용(HTML) 채우기
                        card.innerHTML = `
                            <div class="card-header">
                                <h3>${room.title}</h3>
                                <span class="status-dot"></span>
                            </div>
                            <p class="teacher-name">${room.username} 선생님</p>
                            <div class="tag-group">
                                <span class="tag subject-tag">${room.subject}</span>
                                <span class="tag level-tag">${room.level}</span>
                            </div>
                        `;

                        // 🌟 3. 핵심! 카드 클릭 시 방으로 입장하는 이벤트 🌟
                        card.addEventListener("click", () => {
                            const confirmEnter = confirm(`'${room.title}' 방에 입장하시겠습니까?`);
                            
                            if (confirmEnter) {
                                // 💡 중요: 이동할 실제 화상채팅방 파일 이름으로 경로를 적어주세요.
                                // URL 뒤에 '?roomId=방번호'를 붙여서 다음 페이지로 방 번호를 전달합니다.
                                window.location.href = `/room.html?roomId=${room._id}`; 
                            }
                        });

                        // 4. 완성된 카드를 화면(roomGrid)에 추가
                        roomGrid.appendChild(card);
                    }
                });

            } catch (error) {
                console.error("방 목록 로드 중 에러:", error);
            }
        }

        // 페이지가 열리자마자 방 목록을 불러오도록 함수 실행!
        loadRooms();
    </script>
</body>
</html>
